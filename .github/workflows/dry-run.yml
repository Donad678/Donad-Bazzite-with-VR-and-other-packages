---
name: Dry Run Build
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  #schedule:
  #  - cron: '05 10 * * *'  # 10:05am UTC everyday
  #push:
  #  branches:
   #   - main
   # paths-ignore:
   #   - '**/README.md'

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  ARTIFACTHUB_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  DEFAULT_TAG: "latest"

jobs:
  build_push:
    name: Dry Build Image (no push)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: main-kde
            base: ghcr.io/ublue-os/bazzite:stable
            image_name: "donad-bazzite-kde-mesa"
            image_desc: "Custom Bazzite KDE for AMD and Intel Systems"
            is_kde: "true"

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v7

      # Workaround bug where capital letters in your GitHub username make it impossible to push to GHCR.
      # https://github.com/macbre/push-to-ghcr/issues/12
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Lowercase Image
        id: image_case
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ matrix.image_name }}

      - name: Check for base image update
        id: check_update
        shell: bash
        run: |
          set -e

          upstream_digest=$(skopeo inspect docker://${{ matrix.base }} | jq -r '.Digest')
          echo "upstream_digest=${upstream_digest}" >> "$GITHUB_OUTPUT"

          last_digest=$(skopeo inspect docker://${{ steps.registry_case.outputs.lowercase }}/${{ steps.image_case.outputs.lowercase }}:latest 2>/dev/null \
            | jq -r '.Labels["org.donad.base_digest"] // "none"' || echo "none")

          echo "Upstream digest: ${upstream_digest}"
          echo "Last built against: ${last_digest}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — building regardless of digest."
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Pull request — building for validation regardless of digest."
          elif [[ "${upstream_digest}" != "${last_digest}" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "New base image detected — building."
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "No change in base image — skipping build."
          fi

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: metadata
        if: steps.check_update.outputs.should_build == 'true'
        with:
          # This generates all the tags for your image, you can add custom tags here too!
          # By default, it should generate "latest" and "latest.(date here)".
          tags: |
            type=raw,value=latest
            type=raw,value=latest.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ matrix.image_name }}/refs/heads/main/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ matrix.image_desc }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ matrix.image_name }}/refs/heads/main/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ matrix.image_name }}/blob/main/Containerfile
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ matrix.image_name }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=latest
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=bootc,ublue,universal-blue
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.ARTIFACTHUB_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      # 3. Build the Image
      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            IS_KDE=${{ matrix.is_kde }}
            BASE_DIGEST=${{ steps.check_update.outputs.upstream_digest }}
          # Build it with the full name immediately
          image: ${{ matrix.image_name }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: true
